  <style>
    :root {
      --bg: #1a1d23;
      --surface: #252830;
      --text: #e6e8ec;
      --muted: #8b909a;
      --accent: #00a3e0;
      --correct: #2d8f6f;
      --incorrect: #c45c4c;
    }
    * { box-sizing: border-box; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 1rem;
      line-height: 1.5;
    }
    .container { max-width: 42rem; margin: 0 auto; }
    h1 { font-size: 1.25rem; font-weight: 600; margin: 0 0 0.25rem; }
    .meta { font-size: 0.875rem; color: var(--muted); margin-bottom: 1.5rem; }
    .domain-tag {
      display: inline-block;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }
    .question-block {
      background: var(--surface);
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.25rem;
    }
    .question-text { font-weight: 500; margin-bottom: 1rem; }
    .options { list-style: none; padding: 0; margin: 0; }
    .options li { margin-bottom: 0.5rem; }
    .options label {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      cursor: pointer;
      padding: 0.5rem;
      border-radius: 6px;
    }
    .options label:hover { background: rgba(255,255,255,0.04); }
    .options input { margin-top: 0.2rem; flex-shrink: 0; }
    .options .opt-key { flex-shrink: 0; font-weight: 600; color: var(--muted); }
    .options .opt-text { flex: 1; }
    .options .result {
      font-size: 0.8rem;
      margin-left: 0.5rem;
    }
    .options .result.correct { color: var(--correct); }
    .options .result.incorrect { color: var(--incorrect); }
    .actions { margin-top: 1.5rem; display: flex; gap: 0.75rem; flex-wrap: wrap; }
    button {
      background: var(--accent);
      color: var(--bg);
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
    }
    button:hover { filter: brightness(1.1); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .score-card {
      background: var(--surface);
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.5rem;
      border-left: 4px solid var(--accent);
    }
    .score-card h2 { font-size: 1rem; margin: 0 0 0.5rem; }
    .score-card p { margin: 0; color: var(--muted); font-size: 0.9rem; }
    footer { margin-top: 2rem; font-size: 0.75rem; color: var(--muted); }
    .load-error {
      background: var(--surface);
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
      color: var(--muted);
      border-left: 4px solid var(--incorrect);
    }
    .load-error code { background: rgba(255,255,255,0.08); padding: 0.2em 0.4em; border-radius: 4px; font-size: 0.9em; }
    .load-error input[type="file"] { margin-top: 0.5rem; color: var(--text); font-size: 0.9rem; }
  </style>
</head>

ly"}, {"key": "b", "text": "XY Table To Point or Display XY Data"}, {"key": "c", "text": "Buffer tool only"}, {"key": "d", "text": "Clip tool only"}], "correctKey": "b"}, {"id": "q29", "domainId": "mapping-visualization", "text": "Where are geoprocessing tools organized in ArcGIS Pro?", "options": [{"key": "a", "text": "Only in the Contents pane"}, {"key": "b", "text": "In toolboxes (e.g., Analysis, Data Management) in the Catalog pane or Geoprocessing pane"}, {"key": "c", "text": "Only in the Layout view"}, {"key": "d", "text": "Only in the Symbology pane"}], "correctKey": "b"}, {"id": "q30", "domainId": "layouts-sharing", "text": "A project package (.ppkx) is used to:", "options": [{"key": "a", "text": "Store only a single layer"}, {"key": "b", "text": "Package the project and its referenced data for sharing"}, {"key": "c", "text": "Run Python scripts only"}, {"key": "d", "text": "Change the coordinate system only"}], "correctKey": "b"}, {"id": "q31", "domainId": "data-management", "text": "Which geodatabase type is stored as a folder on disk?", "options": [{"key": "a", "text": "File geodatabase"}, {"key": "b", "text": "Enterprise geodatabase only"}, {"key": "c", "text": "Shapefile"}, {"key": "d", "text": "CSV"}], "correctKey": "a"}, {"id": "q32", "domainId": "data-management", "text": "What must you do before editing features in ArcGIS Pro?", "options": [{"key": "a", "text": "Start an edit session"}, {"key": "b", "text": "Export the layer"}, {"key": "c", "text": "Change symbology"}, {"key": "d", "text": "Add a layout"}], "correctKey": "a"}, {"id": "q33", "domainId": "data-management", "text": "Which property prevents a field from containing null values?", "options": [{"key": "a", "text": "Nullable"}, {"key": "b", "text": "Length"}, {"key": "c", "text": "Alias"}, {"key": "d", "text": "Default value"}], "correctKey": "a"}, {"id": "q34", "domainId": "data-management", "text": "A shapefile can store which geometry type?", "options": [{"key": "a", "text": "Points, lines, or polygons"}, {"key": "b", "text": "Only rasters"}, {"key": "c", "text": "Only annotations"}, {"key": "d", "text": "Only tables"}], "correctKey": "a"}, {"id": "q35", "domainId": "data-management", "text": "Where is the default geodatabase for a project set?", "options": [{"key": "a", "text": "Project properties"}, {"key": "b", "text": "Map properties only"}, {"key": "c", "text": "Layout view"}, {"key": "d", "text": "Symbology pane"}], "correctKey": "a"}, {"id": "q36", "domainId": "data-management", "text": "What does saving edits do in an edit session?", "options": [{"key": "a", "text": "Commits changes to the data"}, {"key": "b", "text": "Exports the map"}, {"key": "c", "text": "Creates a backup"}, {"key": "d", "text": "Changes symbology"}], "correctKey": "a"}, {"id": "q37", "domainId": "data-management", "text": "Which format is a single file that can hold multiple feature classes?", "options": [{"key": "a", "text": "File geodatabase"}, {"key": "b", "text": "Shapefile"}, {"key": "c", "text": "CSV"}, {"key": "d", "text": "TXT"}], "correctKey": "a"}, {"id": "q38", "domainId": "data-management", "text": "To add a new field to an existing attribute table, you use:", "options": [{"key": "a", "text": "Add Field or Fields view"}, {"key": "b", "text": "Symbology pane only"}, {"key": "c", "text": "Layout view"}, {"key": "d", "text": "Map properties only"}], "correctKey": "a"}, {"id": "q39", "domainId": "data-management", "text": "A projected coordinate system is often used to:", "options": [{"key": "a", "text": "Measure distances and areas in consistent units"}, {"key": "b", "text": "Store metadata only"}, {"key": "c", "text": "Display labels only"}, {"key": "d", "text": "Export to PDF"}], "correctKey": "a"}, {"id": "q40", "domainId": "data-management", "text": "Which data format stores one feature class per file and has .shp, .shx, .dbf?", "options": [{"key": "a", "text": "Shapefile"}, {"key": "b", "text": "File geodatabase"}, {"key": "c", "text": "CSV"}, {"key": "d" , {"key": "d", "text": "Add layouts only"}], "correctKey": "a"}, {"id": "q121", "domainId": "layouts-sharing", "text": "Which option lets you share a copy of your project and data for use in another location?", "options": [{"key": "a", "text": "Project package"}, {"key": "b", "text": "CSV export only"}, {"key": "c", "text": "Shapefile only"}, {"key": "d", "text": "Metadata only"}], "correctKey": "a"}, {"id": "q122", "domainId": "performing-analysis", "text": "The Summarize Within tool:", "options": [{"key": "a", "text": "Summarizes features within polygon areas"}, {"key": "b", "text": "Creates buffers only"}, {"key": "c", "text": "Selects by attributes only"}, {"key": "d", "text": "Exports to PDF only"}], "correctKey": "a"}, {"id": "q123", "domainId": "data-management", "text": "A feature template in the Create Features pane:", "options": [{"key": "a", "text": "Defines the default attributes and tool for creating new features"}, {"key": "b", "text": "Stores only the map"}, {"key": "c", "text": "Runs geoprocessing only"}, {"key": "d", "text": "Exports to CSV only"}], "correctKey": "a"}, {"id": "q124", "domainId": "mapping-visualization", "text": "To align or distribute multiple layout elements, you use:", "options": [{"key": "a", "text": "Format tab or right-click Align/Distribute"}, {"key": "b", "text": "Catalog pane only"}, {"key": "c", "text": "Geoprocessing only"}, {"key": "d", "text": "Attributes pane only"}], "correctKey": "a"}, {"id": "q125", "domainId": "performing-analysis", "text": "The Spatial Join tool:", "options": [{"key": "a", "text": "Joins attributes from one layer to another based on location"}, {"key": "b", "text": "Creates buffers only"}, {"key": "c", "text": "Clips features only"}, {"key": "d", "text": "Exports to PDF only"}], "correctKey": "a"}, {"id": "q126", "domainId": "data-management", "text": "To avoid losing work, you should:", "options": [{"key": "a", "text": "Save the project and save edits regularly"}, {"key": "b", "text": "Only run Bu e is used to:", "options": [{"key": "a", "text": "Share geocoding or locator data"}, {"key": "b", "text": "Store only attributes"}, {"key": "c", "text": "Run Buffer only"}, {"key": "d", "text": "Change symbology only"}], "correctKey": "a"}, {"id": "q157", "domainId": "performing-analysis", "text": "The Multiple Ring Buffer tool:", "options": [{"key": "a", "text": "Creates multiple buffer rings at specified distances"}, {"key": "b", "text": "Selects by attributes only"}, {"key": "c", "text": "Clips features only"}, {"key": "d", "text": "Exports to PDF only"}], "correctKey": "a"}, {"id": "q158", "domainId": "data-management", "text": "To join a table to a layer by a common field, you use:", "options": [{"key": "a", "text": "Layer properties > Joins and Relates > Add Join"}, {"key": "b", "text": "Symbology pane only"}, {"key": "c", "text": "Layout view only"}, {"key": "d", "text": "Buffer tool only"}], "correctKey": "a"}, {"id": "q159", "domainId": "mapping-visualization", "text": "The Feature Layer contextual tab appears when:", "options": [{"key": "a", "text": "A feature layer is selected in the Contents pane"}, {"key": "b", "text": "The Catalog is active"}, {"key": "c", "text": "A layout is active"}, {"key": "d", "text": "Metadata is open"}], "correctKey": "a"}, {"id": "q160", "domainId": "performing-analysis", "text": "The Point Distance tool:", "options": [{"key": "a", "text": "Calculates distances between points in two layers"}, {"key": "b", "text": "Creates buffers only"}, {"key": "c", "text": "Clips features only"}, {"key": "d", "text": "Exports to CSV only"}], "correctKey": "a"}, {"id": "q161", "domainId": "data-management", "text": "To calculate a new field value for many features at once, you use:", "options": [{"key": "a", "text": "Calculate Field or Calculate Geometry"}, {"key": "b", "text": "Symbology pane only"}, {"key": "c", "text": "Layout view only"}, {"key": "d", "text": "Buffer tool only"}], "correctKey": "a"}, {"id": "q162", "domainId": "mapping-vi ures only"}, {"key": "d", "text": "Exports to CSV only"}], "correctKey": "a"}, {"id": "q168", "domainId": "data-management", "text": "To export selected features to a new feature class, you:", "options": [{"key": "a", "text": "Right-click the layer > Data > Export Features"}, {"key": "b", "text": "Use Symbology pane only"}, {"key": "c", "text": "Use Layout view only"}, {"key": "d", "text": "Run Buffer only"}], "correctKey": "a"}, {"id": "q169", "domainId": "mapping-visualization", "text": "To show a layer only when zoomed in (e.g., labels at large scale), you set:", "options": [{"key": "a", "text": "Maximum scale (visible at scales larger than)"}, {"key": "b", "text": "Symbology only"}, {"key": "c", "text": "Coordinate system only"}, {"key": "d", "text": "Definition query only"}], "correctKey": "a"}, {"id": "q170", "domainId": "layouts-sharing", "text": "To update a shared web layer with changes, you:", "options": [{"key": "a", "text": "Overwrite the existing web layer when sharing again"}, {"key": "b", "text": "Export to CSV only"}, {"key": "c", "text": "Run Buffer only"}, {"key": "d", "text": "Change symbology only"}], "correctKey": "a"}, {"id": "q171", "domainId": "performing-analysis", "text": "The Minimum Bounding Geometry tool:", "options": [{"key": "a", "text": "Creates a polygon that encloses input features"}, {"key": "b", "text": "Creates buffers only"}, {"key": "c", "text": "Selects by attributes only"}, {"key": "d", "text": "Exports to PDF only"}], "correctKey": "a"}, {"id": "q172", "domainId": "data-management", "text": "To see the coordinate system of a layer, you check:", "options": [{"key": "a", "text": "Layer properties > Source > Spatial Reference"}, {"key": "b", "text": "Symbology only"}, {"key": "c", "text": "Layout only"}, {"key": "d", "text": "Buffer tool only"}], "correctKey": "a"}, {"id": "q173", "domainId": "mapping-visualization", "text": "To apply the same symbology from one layer to another, you can:", "options": [{"key": "a", "text": "Imp nly"}, {"key": "c", "text": "Coordinate system only"}, {"key": "d", "text": "Definition query only"}], "correctKey": "a"}, {"id": "q191", "domainId": "layouts-sharing", "text": "To create a map that updates when the source data changes, you share:", "options": [{"key": "a", "text": "A web layer (e.g., hosted feature layer) that references the data"}, {"key": "b", "text": "Only a PDF"}, {"key": "c", "text": "Only a shapefile"}, {"key": "d", "text": "Only a CSV"}], "correctKey": "a"}, {"id": "q192", "domainId": "performing-analysis", "text": "The Create Watersheds tool:", "options": [{"key": "a", "text": "Delineates upstream areas that drain to points"}, {"key": "b", "text": "Creates buffers only"}, {"key": "c", "text": "Selects by attributes only"}, {"key": "d", "text": "Exports to PDF only"}], "correctKey": "a"}, {"id": "q193", "domainId": "data-management", "text": "To run a geoprocessing tool from the Catalog pane, you:", "options": [{"key": "a", "text": "Open a toolbox, right-click a tool, and choose Open"}, {"key": "b", "text": "Use Symbology pane only"}, {"key": "c", "text": "Use Layout view only"}, {"key": "d", "text": "Export to CSV only"}], "correctKey": "a"}, {"id": "q194", "domainId": "mapping-visualization", "text": "To show a different symbol for selected features, you set:", "options": [{"key": "a", "text": "Selection symbology in the layer properties or Symbology pane"}, {"key": "b", "text": "Coordinate system only"}, {"key": "c", "text": "Layout only"}, {"key": "d", "text": "Buffer tool only"}], "correctKey": "a"}, {"id": "q195", "domainId": "performing-analysis", "text": "The Find Similar Locations tool:", "options": [{"key": "a", "text": "Finds places that match criteria based on attributes and optionally location"}, {"key": "b", "text": "Creates buffers only"}, {"key": "c", "text": "Clips features only"}, {"key": "d", "text": "Exports to PDF only"}], "correctKey": "a"}, {"id": "q196", "domainId": "data-management", "text": "To see the history of geoprocessing tools run in the project, you open:", "options": [{"key": "a", "text": "The Geoprocessing History pane"}, {"key": "b", "text": "Symbology pane only"}, {"key": "c", "text": "Layout view only"}, {"key": "d", "text": "Buffer tool only"}], "correctKey": "a"}, {"id": "q197", "domainId": "mapping-visualization", "text": "To align a map frame to the edge of the layout, you use:", "options": [{"key": "a", "text": "Format tab Align or Distribute options"}, {"key": "b", "text": "Geoprocessing only"}, {"key": "c", "text": "Catalog pane only"}, {"key": "d", "text": "Attributes pane only"}], "correctKey": "a"}, {"id": "q198", "domainId": "layouts-sharing", "text": "To allow others to edit a shared feature layer, you:", "options": [{"key": "a", "text": "Share as a feature layer with edit capability enabled"}, {"key": "b", "text": "Export to CSV only"}, {"key": "c", "text": "Run Buffer only"}, {"key": "d", "text": "Change symbology only"}], "correctKey": "a"}, {"id": "q199", "domainId": "performing-analysis", "text": "The Trace Downstream tool:", "options": [{"key": "a", "text": "Traces the path downstream from points in a flow direction raster"}, {"key": "b", "text": "Creates buffers only"}, {"key": "c", "text": "Selects by attributes only"}, {"key": "d", "text": "Exports to PDF only"}], "correctKey": "a"}, {"id": "q200", "domainId": "data-management", "text": "To create a new project from a template, you:", "options": [{"key": "a", "text": "Use the start page or File > New and choose a template"}, {"key": "b", "text": "Run Buffer only"}, {"key": "c", "text": "Export to CSV only"}, {"key": "d", "text": "Change symbology only"}], "correctKey": "a"}];
      var questionBank = EMBEDDED_QUESTIONS.slice();
      var currentQuestions = [];

      var domainNames = {};
      EXAM_SPEC.domains.forEach(function (d) { domainNames[d.id] = d.name; });

      function shuffleArray(arr) {
        var a = arr.slice();
        for (var i = a.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1));
          var t = a[i];
          a[i] = a[j];
          a[j] = t;
        }
        return a;
      }

      function pickRandomSubset(arr, n) {
        var copy = arr.slice();
        if (copy.length <= n) return copy;
        shuffleArray(copy);
        return copy.slice(0, n);
      }

      function buildExamSet() {
        var subset = pickRandomSubset(questionBank, EXAM_QUESTION_COUNT);
        var displayKeys = ['a', 'b', 'c', 'd'];
        return shuffleArray(subset).map(function (q) {
          var shuffled = shuffleArray(q.options.slice());
          var correctIndex = -1;
          for (var i = 0; i < shuffled.length; i++) {
            if (shuffled[i].key === q.correctKey) {
              correctIndex = i;
              break;
            }
          }
          var options = shuffled.map(function (opt, i) {
            return { key: displayKeys[i], text: opt.text };
          });
          var correctKey = correctIndex >= 0 ? displayKeys[correctIndex] : q.correctKey;
          return {
            id: q.id,
            domainId: q.domainId,
            text: q.text,
            correctKey: correctKey,
            options: options
          };
        });
      }

      function updateMetaLine() {
        var el = document.getElementById('meta-line');
        if (!el) return;
        el.textContent = 'Bank: ' + questionBank.length + ' questions · This exam: ' + currentQuestions.length + ' (random ' + EXAM_QUESTION_COUNT + ') · 90 min in real exam · Multiple choice';
      }

      function render(questions) {
        var root = document.getElementById('questions-root');
        root.innerHTML = '';
        var list = questions || currentQuestions;
        list.forEach(function (q, idx) {
          var domainName = domainNames[q.domainId] || q.domainId;
          var block = document.createElement('div');
          block.className = 'question-block';
          block.dataset.questionId = q.id;
          var optList = q.options.map(function (opt) {
            return '<li><label><input type="radio" name="' + q.id + '" value="' + opt.key + '"><span class="opt-key">' + opt.key + ')</span><span class="opt-text">' + escapeHtml(opt.text) + '</span><span class="result" data-key="' + opt.key + '"></span></label></li>';
          }).join('');
          block.innerHTML =
            '<span class="domain-tag">' + escapeHtml(domainName) + '</span>' +
            '<div class="question-text">' + (idx + 1) + '. ' + escapeHtml(q.text) + '</div>' +
            '<ul class="options">' + optList + '</ul>';
          root.appendChild(block);
        });
      }

      function escapeHtml(s) {
        var div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML;
      }

      function getAnswers() {
        var out = {};
        currentQuestions.forEach(function (q) {
          var el = document.querySelector('input[name="' + q.id + '"]:checked');
          out[q.id] = el ? el.value : null;
        });
        return out;
      }

      function showResults(answers) {
        var correct = 0;
        currentQuestions.forEach(function (q) {
          var block = document.querySelector('.question-block[data-question-id="' + q.id + '"]');
          var opts = block.querySelectorAll('.options .result');
          opts.forEach(function (span) {
            span.textContent = '';
            span.className = 'result';
            var key = span.dataset.key;
            if (key !== q.correctKey && key === answers[q.id]) {
              span.textContent = ' Incorrect';
              span.className = 'result incorrect';
            } else if (key === q.correctKey) {
              span.textContent = answers[q.id] === key ? ' Correct' : ' Correct answer';
              span.className = 'result correct';
              if (answers[q.id] === key) correct++;
            }
          });
        });
        var scoreRoot = document.getElementById('score-root');
        scoreRoot.hidden = false;
        scoreRoot.innerHTML = '<h2>Score: ' + correct + ' / ' + currentQuestions.length + '</h2><p>Real exam: ' + EXAM_SPEC.details.questionCount + ' questions, ' + EXAM_SPEC.details.durationMinutes + ' minutes.</p>';
        document.getElementById('btn-submit').disabled = true;
      }

      function reset() {
        document.querySelectorAll('input[type="radio"]').forEach(function (el) { el.checked = false; });
        document.querySelectorAll('.options .result').forEach(function (el) { el.textContent = ''; el.className = 'result'; });
        document.getElementById('score-root').hidden = true;
        document.getElementById('score-root').innerHTML = '';
        document.getElementById('btn-submit').disabled = false;
      }

      function startNewExam() {
        currentQuestions = buildExamSet();
        render(currentQuestions);
        reset();
        updateMetaLine();
      }

      document.getElementById('btn-new-exam').addEventListener('click', startNewExam);
      document.getElementById('btn-submit').addEventListener('click', function () {
        var answers = getAnswers();
        showResults(answers);
      });
      document.getElementById('btn-reset').addEventListener('click', reset);

      function loadBankFromFile(file) {
        var reader = new FileReader();
        reader.onload = function () {
          try {
            var data = JSON.parse(reader.result);
            if (data.questions && data.questions.length) {
              questionBank = data.questions;
              onBankReady();
            } else {
              showLoadError('No "questions" array found in the file.');
            }
          } catch (e) {
            showLoadError('Invalid JSON: ' + e.message);
          }
        };
        reader.onerror = function () { showLoadError('Could not read file.'); };
        reader.readAsText(file);
      }

      function showLoadError(extraMessage) {
        var root = document.getElementById('questions-root');
        root.innerHTML =
          '<p class="load-error">' +
          (extraMessage || 'Question bank could not be loaded from the network (e.g. when opening this file directly).') +
          '<br>Load from your computer: <input type="file" id="load-questions-file" accept=".json,application/json" aria-label="Choose questions.json">' +
          '</p>';
        var input = document.getElementById('load-questions-file');
        if (input) {
          input.addEventListener('change', function (e) {
            var f = e.target.files[0];
            if (f) loadBankFromFile(f);
          });
        }
      }

      function onBankReady() {
        updateMetaLine();
        if (questionBank.length === 0) {
          showLoadError();
          return;
        }
        startNewExam();
      }

      fetch(QUESTIONS_JSON)
        .then(function (r) { return r.json(); })
        .then(function (data) {
          if (data.questions && data.questions.length) {
            questionBank = data.questions;
          }
          onBankReady();
        })
        .catch(function () {
          onBankReady();
        });
    })();
  </script>
